services:
  scheduler:
    build: .
    command: ["python", "main.py", "run"]
    restart: always
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./trades:/app/trades
      - ./snapshots:/app/snapshots

  api:
    build: .
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
