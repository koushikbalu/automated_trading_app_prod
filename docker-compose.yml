services:
  scheduler:
    build: .
    command: ["python", "main.py", "run"]
    restart: always
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./trades:/app/trades
      - ./snapshots:/app/snapshots
      - ./kite_token.json:/app/kite_token.json
      - ./cache:/app/cache

  api:
    build: .
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./kite_token.json:/app/kite_token.json
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
